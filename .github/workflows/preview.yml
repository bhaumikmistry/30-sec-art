name: Preview Submission
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Comment preview
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const jsonFile = files.find(f => f.filename.endsWith('.json') && f.filename !== 'index.json' && f.status === 'added');
            if (!jsonFile) { console.log('No new JSON file'); return; }

            const data = JSON.parse(fs.readFileSync(jsonFile.filename, 'utf-8'));
            const branch = context.payload.pull_request.head.ref;
            const renderUrl = `https://www.bhaumikmistry.com/api/faces/render?file=${jsonFile.filename}&branch=${branch}`;
            const previewUrl = `https://www.bhaumikmistry.com/projects/30-sec-art/preview?file=${jsonFile.filename}&branch=${branch}`;

            const body = [
              `### 🎨 Submission Preview`,
              ``,
              `| | |`,
              `|---|---|`,
              `| **Artist** | ${data.artist || 'Anonymous'} |`,
              `| **Theme** | ${data.theme || 'unknown'} |`,
              `| **Strokes** | ${(data.strokes || []).length} |`,
              `| **File** | \`${jsonFile.filename}\` |`,
              ``,
              `![preview](${renderUrl})`,
              ``,
              `[🔗 Open full preview](${previewUrl})`,
            ].join('\n');

            // Remove old preview comments
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.body?.includes('### 🎨 Submission Preview')) {
                await github.rest.issues.deleteComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: c.id });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body,
            });
